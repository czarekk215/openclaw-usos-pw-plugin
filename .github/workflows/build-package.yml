name: Build Plugin Package

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Pack plugin
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts
          tar -tzf artifacts/*.tgz > /dev/null

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-usos-pw-plugin-package
          path: artifacts/*.tgz
          if-no-files-found: error

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v') && secrets.NPM_TOKEN != ''
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: openclaw-usos-pw-plugin-package
          path: artifacts

      - name: Publish to npm
        run: npm publish artifacts/*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: openclaw-usos-pw-plugin-package
          path: artifacts

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tgz
